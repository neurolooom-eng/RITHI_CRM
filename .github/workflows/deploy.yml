name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push.
# One-time setup (you do this once in the repo): Settings → Pages →
# "Build and deployment" → Source: GitHub Actions.

on:
  push:
    branches:
      - main
      - claude/field-service-module-poc-hslouq
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        # Auto-enable Pages (Source: GitHub Actions) so no manual repo toggle is needed.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
