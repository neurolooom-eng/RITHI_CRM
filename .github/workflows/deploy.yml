name: Deploy to GitHub Pages

# Builds the Vite app and publishes the static site to the `gh-pages` branch.
# We push to a branch (a normal git operation the workflow token is allowed to
# do) instead of using the Pages API, which is blocked for the token here.
#
# After the first successful run, if the site isn't live yet, set:
#   Settings -> Pages -> Build and deployment -> Source: "Deploy from a branch"
#   Branch: gh-pages  /  (root)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # serve assets as-is (no Jekyll processing)
          enable_jekyll: false
